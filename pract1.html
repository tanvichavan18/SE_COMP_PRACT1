<!DOCTYPE html>
<html>
<head>
    <title>My First GitHub Project</title>
</head>
<body>

    <h1>Hello, GitHub! 🚀</h1>
    <p id="msg">Click the button to change text</p>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("msg").innerHTML = "You clicked the button!";
        }
    </script>

</body>
</html>
